<!DOCTYPE html>
<html>
<head>
    <title>Egerton Uni</title>
</head>
<body>

<h1>EGERTON UNI ONLINE APPLICATION FORM</h1>

<form action="submit_application" method="post">
    
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"required>
    <br><br>

    <label for="phone-no">Phone Number:</label>
    <input type="tel" id="phone-no" name="phone-no">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"required>
    <br><br>

    <label for="d-o-b">Date of Birth:</label>
    <input type="date" id="d-o-b" name="d-o-b">
    <br><br>

    <label for="course">Course:</label>
    <input type="text" id="course" name="course">
    <br><br>

    <input type="submit" value="Submit">

</form>
</body>
</html>
